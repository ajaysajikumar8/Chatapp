events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver IP
    resolver 127.0.0.11 valid=10s;

    upstream chat_backend {
        # Using Docker's internal DNS load balancer for the backend service name.
        # This will automatically resolve to all running containers of the backend service.
        server backend:3000;
    }

    server {
        listen 80;

        # Frontend assets
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # REST API routing
        location /api/ {
            proxy_pass http://chat_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Socket.IO Routing
        location /socket.io/ {
            proxy_pass http://chat_backend;
            proxy_http_version 1.1;
            proxy_buffering off;
            
            # protocol upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket timeouts to prevent dropping idle connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
